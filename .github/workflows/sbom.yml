name: SBOM

# Genererer en Software Bill of Materials i både CycloneDX- og SPDX-format.
# Kører ved hver pull request (Fase 4 §6.3: pipeline-artefakt) og ved release
# (Fase 6 §6.6: arkiveret og koblet til versionsnummer).
# Output uploades som GitHub Actions artifacts.
# BEMAERK: koden ligger i undermappen nordvault-demo/, sa npm-trin korer der
# (working-directory), og SBOM-vaerktojer peges mod den mappe.
# TEST KOMMENTAR
on:
  pull_request:
  release:
    types: [published]
  workflow_dispatch: # tillader manuel kørsel fra Actions-fanen

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6 

      - name: Setup Node.js
        uses: actions/setup-node@v5 
        with:
          node-version: 24
          cache: npm

      # npm ci installerer præcis det der står i package-lock.json og fejler
      # hvis lock og manifest ikke matcher. Det er netop det man vil have til
      # en SBOM: det vi scanner er det vi har låst (Fase 4 §6.3).
      - name: Install dependencies
        run: npm ci

      # --- CycloneDX (via OWASP cyclonedx-npm) ---
      - name: Generate CycloneDX SBOM
        run: |
          npx --yes @cyclonedx/cyclonedx-npm@latest \
            --output-format JSON \
            --output-file sbom.cyclonedx.json

      # --- SPDX (via Anchore syft) ---
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      # --- Bestem et sporbart versions-/referencenavn ---
      - name: Determine SBOM reference
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      # --- Upload begge SBOM'er som ét samlet artefakt ---
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v6
        with:
          name: sbom-${{ steps.ref.outputs.name }}
          path: |
            sbom.cyclonedx.json
            sbom.spdx.json
          retention-days: 90
          if-no-files-found: error
